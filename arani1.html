<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Clothing Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .card-body {
            padding: 1rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
        }

        .card-text {
            font-size: 0.9rem;
            color: #777;
        }

        .card-text.fw-bold {
            color: #FF5722;
        }

        :root {
            --primary-color: #6a11cb;
            --secondary-color: #2575fc;
            --accent-color: #ff7e5f;
            --text-light: #ffffff;
            --text-dark: #333333;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --nav-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            padding-top: 80px;
        }

        /* Enhanced Navbar */
        .navbar {
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--nav-shadow);
            padding: 15px 0;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            padding: 10px 0;
            background: rgba(106, 17, 203, 0.95);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            font-weight: 700;
            font-size: 1.8rem;
            color: var(--primary-color);
            transition: all 0.3s ease;
        }

        .navbar-brand img {
            border-radius: 10px;
            margin-right: 10px;
            transition: transform 0.3s ease;
        }

        .navbar-brand:hover img {
            transform: rotate(15deg);
        }

        .navbar-brand:hover {
            color: var(--secondary-color);
        }

        .navbar-nav {
            margin-left: auto;
        }

        .nav-item {
            margin: 0 8px;
            position: relative;
        }

        .nav-link {
            color: var(--text-dark);
            font-weight: 500;
            padding: 8px 15px !important;
            border-radius: 20px;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
        }

        .nav-link i {
            margin-right: 8px;
            font-size: 1.1rem;
        }

        .nav-link:hover {
            color: var(--text-light);
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(106, 17, 203, 0.2);
        }

        .nav-link.active {
            color: var(--text-light);
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            bottom: 0;
            left: 0;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: var(--accent-color);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        /* Mobile menu toggle */
        .navbar-toggler {
            border: none;
            padding: 0.5rem;
            outline: none;
        }

        .navbar-toggler:focus {
            box-shadow: none;
        }

        .navbar-toggler-icon {
            background-image: none;
            position: relative;
            width: 24px;
            height: 2px;
            background-color: var(--primary-color);
            transition: all 0.3s ease;
        }

        .navbar-toggler-icon::before,
        .navbar-toggler-icon::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 2px;
            background-color: var(--primary-color);
            left: 0;
            transition: all 0.3s ease;
        }

        .navbar-toggler-icon::before {
            transform: translateY(-8px);
        }

        .navbar-toggler-icon::after {
            transform: translateY(8px);
        }

        .navbar-toggler[aria-expanded="true"] .navbar-toggler-icon {
            background-color: transparent;
        }

        .navbar-toggler[aria-expanded="true"] .navbar-toggler-icon::before {
            transform: rotate(45deg);
            background-color: var(--text-light);
        }

        .navbar-toggler[aria-expanded="true"] .navbar-toggler-icon::after {
            transform: rotate(-45deg);
            background-color: var(--text-light);
        }

        /* Dropdown menu */
        .dropdown-menu {
            border: none;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 10px 0;
            margin-top: 10px;
        }

        .dropdown-item {
            padding: 8px 20px;
            transition: all 0.3s ease;
        }

        .dropdown-item:hover {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        /* Hero Section */
        .hero button {
            background-color: rgb(255, 165, 0);
            color: white;
            border-radius: 10px;
            font-size: 25px;
            border: none;
            padding: 10px 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .hero button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 165, 0, 0.4);
        }

        .card img {
            height: 430px;
            object-fit: cover;
        }

        .card-body button {
            color: white;
            background-color: green;
            border-radius: 10px;
            border: none;
            padding: 8px 20px;
            transition: all 0.3s ease;
        }

        .card-body button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 128, 0, 0.4);
        }

        .card-body button a {
            text-decoration: none;
            color: white;
        }

        .container .navbar-brand img {
            border-radius: 10px;
        }

        .cart-item {
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            background-color: #fff;
        }

        .cart-item img {
            max-width: 100px;
            margin-right: 15px;
            height: 100px;
            object-fit: cover;
        }

        .total-price {
            font-weight: bold;
            font-size: 1.5rem;
            margin-top: 20px;
        }

        .quantity-input {
            width: 50px;
            height: 30px;
            text-align: center;
        }

        .btn-remove {
            background-color: #dc3545;
            color: white;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .btn-remove:hover {
            background-color: #c82333;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
        }

        .btn-remove-all {
            background: linear-gradient(45deg, red, blue);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-remove-all:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 126, 95, 0.4);
            background: linear-gradient(45deg, blue, red);
        }

        /* Added hover effect for checkout and remove buttons */
        #checkout-button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
            color: white; /* Change text color */
        }

        #remove-all:hover {
            background-color: #c82333; /* Change background color on hover */
            transform: scale(1.05);
            color: white; /* Change text color */
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="img/logo.png" alt="Clothing Shop" width="50" height="50">
                <span class="d-none d-md-inline">Clothing Shop</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-home"></i> Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="Men.html"><i class="fas fa-male"></i> Men's</a></li>
                    <li class="nav-item"><a class="nav-link" href="women.html"><i class="fas fa-female"></i> Women's</a></li>
                    <li class="nav-item"><a class="nav-link" href="child.html"><i class="fas fa-child"></i> Children's</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cart.html"><i class="fas fa-shopping-cart"></i> Cart <span class="cart-count">0</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html"><i class="fas fa-user"></i> Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h3>Newly Arrived Products</h3>
        <div id="product-list" class="row"></div>
    </div>
    

    <div class="container my-5">
        <h2>Your Shopping Cart</h2>
        <div id="cart-items"></div>
        <div class="total-price" id="total-price">Total: Rs. 0</div>
        <button class="btn btn-primary mt-3" id="checkout-button">Proceed to Checkout</button>
        <button class="btn btn-remove-all mt-3 float-end" id="remove-all">
            <i class="fas fa-trash-alt me-2"></i>Remove All Items
        </button>
    </div>
    
    <script>
        function loadCartItems() {
            const cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
            const $cartContainer = $('#cart-items');
            const $totalPriceElement = $('#total-price');
            let totalPrice = 0;
            $cartContainer.empty();
			
			

            $.each(cartItems, function(index, item) {
                const $itemElement = $(`
                    <div class="cart-item">
                        <div class="d-flex align-items-center">
                            <img src="${item.image}" alt="${item.title}">
                            <div>
                                <h5>${item.title}</h5>
                                <p>Price: Rs. ${item.price}</p>
                                <div class="d-flex align-items-center">
                                    <button class="btn btn-sm btn-decrement" data-index="${index}">-</button>
                                    <input type="number" class="quantity-input mx-2" value="${item.quantity}" data-index="${index}" min="1">
                                    <button class="btn btn-sm btn-increment" data-index="${index}">+</button>
                                </div>
                                <button class="btn btn-danger btn-remove mt-2" data-index="${index}">Remove</button>
                            </div>
                        </div>
                    </div>
                `);
                $cartContainer.append($itemElement);
                totalPrice += item.price * item.quantity;
            });

            $totalPriceElement.text(`Total: Rs. ${totalPrice}`);
            updateCartCount();
        }

        function removeCartItem(index) {
            let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
            cartItems.splice(index, 1);
            localStorage.setItem('cartItems', JSON.stringify(cartItems));
            loadCartItems();
        }

        function updateQuantity(index, quantity) {
            let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
            cartItems[index].quantity = quantity;
            localStorage.setItem('cartItems', JSON.stringify(cartItems));
            loadCartItems();
        }

        function updateCartCount() {
            const cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
            $('.cart-count').text(cartItems.length);
        }

        // Event Listeners
        $(document).on('click', '.btn-remove', function() {
            const index = parseInt($(this).data('index'));
            $(this).addClass('clicked'); // Visual feedback
            setTimeout(() => $(this).removeClass('clicked'), 300); // Remove class after effect
            removeCartItem(index);
        });

        $(document).on('click', '.btn-decrement', function() {
            const index = parseInt($(this).data('index'));
            let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
            if (cartItems[index].quantity > 1) {
                updateQuantity(index, cartItems[index].quantity - 1);
            }
        });

        $(document).on('click', '.btn-increment', function() {
            const index = parseInt($(this).data('index'));
            let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
            updateQuantity(index, cartItems[index].quantity + 1);
        });

        $(document).on('input', '.quantity-input', function() {
            const index = parseInt($(this).data('index'));
            let quantity = Math.max(1, parseInt($(this).val()) || 1);
            updateQuantity(index, quantity);
        });

        // Remove All Functionality
        $('#remove-all').on('click', function() {
            if (confirm("Are you sure you want to remove all items from the cart?")) {
                localStorage.removeItem('cartItems');
                loadCartItems();
            }
        });

        $(document).ready(loadCartItems);
        $('#checkout-button').on('click', function () {
    const cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
    
    // Simulate AJAX by storing in sessionStorage (temporary storage)
    sessionStorage.setItem('checkoutItems', JSON.stringify(cartItems));

    // Redirect to the checkout page
    window.location.href = 'checkout.html';
    
});

    $.ajax({
        url: 'cproducts.json',
        method: 'GET',
        dataType: 'json',
        success: function(products) {
            const $productList = $('#product-list');
            $.each(products, function(index, product) {
                const productCard = `
    <div class="col-sm-4 col-6 mb-4">
        <div class="card shadow-sm h-100 border-0 rounded-3" style="transition: transform 0.3s ease; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);">
            <img src="${product.image}" class="card-img-top" alt="${product.title}" style="height: 200px; object-fit: cover; border-radius: 8px;">
            <div class="card-body p-3">
                <h5 class="card-title text-truncate" style="font-size: 1.1rem;">${product.title}</h5>
                <p class="card-text text-truncate" style="font-size: 0.9rem; color: #666;">${product.description}</p>
                <p class="card-text fw-bold text-primary" style="font-size: 1rem;">Rs. ${product.price}</p>
            </div>
        </div>
    </div>
`;

                $productList.append(productCard);
            });
        },
        error: function(error) {
            console.error("Error loading product data:", error);
        }
    });
</script>
</body>
</html>
